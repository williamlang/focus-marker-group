name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        run: |
          mkdir -p FocusMarkerGroup
          cp FocusMarkerGroup.toc FocusMarkerGroup.lua FocusMarkerGroup/
          zip -r FocusMarkerGroup-${{ github.ref_name }}.zip FocusMarkerGroup/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: FocusMarkerGroup-${{ github.ref_name }}.zip
